<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Time Setup</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="setup-shell">
      <header class="topbar">
        <div>
          <h1>Book Time Setup</h1>
          <p id="setupStatus">Loading current settings...</p>
        </div>
        <a class="button-link" href="/">Open Book Time</a>
      </header>

      <div class="panel setup-panel">
        <h2>Local Connections</h2>
        <div id="runtimeStatus" class="runtime-status"></div>

        <label for="ollamaUrl">Ollama URL</label>
        <input id="ollamaUrl" type="text" placeholder="http://127.0.0.1:11434">

        <label for="ollamaExe">Ollama executable</label>
        <div class="path-row">
          <input id="ollamaExe" type="text" placeholder="C:\Users\you\AppData\Local\Programs\Ollama\ollama.exe">
          <button type="button" class="secondary browse-button" data-target="ollamaExe" data-mode="file" data-title="Select Ollama executable">Browse</button>
        </div>

        <label for="ollamaModel">Ollama assistant model</label>
        <input id="ollamaModel" type="text" placeholder="Choose an installed Ollama model in setup">

        <label for="assistantModelDirs">Local assistant model folders</label>
        <div class="path-stack">
          <textarea id="assistantModelDirs" class="short-text" placeholder="One folder per line"></textarea>
          <button type="button" class="secondary browse-button" data-target="assistantModelDirs" data-mode="dir" data-title="Select assistant model folder" data-append="true">Add Folder</button>
        </div>

        <label for="ollamaTimeout">Ollama prompt timeout seconds</label>
        <input id="ollamaTimeout" type="number" min="10" max="900" step="5" placeholder="45">

        <label for="lmstudioExe">LM Studio executable</label>
        <div class="path-row">
          <input id="lmstudioExe" type="text" placeholder="C:\Users\you\AppData\Local\Programs\LM Studio\LM Studio.exe">
          <button type="button" class="secondary browse-button" data-target="lmstudioExe" data-mode="file" data-title="Select LM Studio executable">Browse</button>
        </div>

        <label for="lmstudioConversations">LM Studio conversations folder</label>
        <div class="path-row">
          <input id="lmstudioConversations" type="text" placeholder="C:\Users\you\.lmstudio\conversations">
          <button type="button" class="secondary browse-button" data-target="lmstudioConversations" data-mode="dir" data-title="Select LM Studio conversations folder">Browse</button>
        </div>

        <label for="lmstudioUserFiles">LM Studio user files folder</label>
        <div class="path-row">
          <input id="lmstudioUserFiles" type="text" placeholder="C:\Users\you\.lmstudio\user-files">
          <button type="button" class="secondary browse-button" data-target="lmstudioUserFiles" data-mode="dir" data-title="Select LM Studio user files folder">Browse</button>
        </div>

        <label for="memoryDir">Story and character data storage location</label>
        <div class="path-row">
          <input id="memoryDir" type="text" placeholder="story_memory">
          <button type="button" class="secondary browse-button" data-target="memoryDir" data-mode="dir" data-title="Select story and character data folder">Browse</button>
        </div>
        <p class="field-help">Stores transcripts, source files, latest_seed.md, continuity.json, and custom_characters.json.</p>

        <label for="presetDir">LM Studio preset files folder</label>
        <div class="path-row">
          <input id="presetDir" type="text" placeholder="lmstudio_presets">
          <button type="button" class="secondary browse-button" data-target="presetDir" data-mode="dir" data-title="Select Book Time preset files folder">Browse</button>
        </div>

        <label for="triggerPhrases">Trigger phrases</label>
        <textarea id="triggerPhrases" class="short-text" placeholder="One phrase per line"></textarea>

        <div class="actions">
          <button id="saveSetup" type="button">Save Setup</button>
          <button id="reloadSetup" type="button" class="secondary">Reload</button>
          <button id="checkStatus" type="button" class="secondary">Check Status</button>
          <button id="installPresets" type="button">Install LM Studio Presets</button>
        </div>

        <label>Files</label>
        <pre id="setupFiles"></pre>
      </div>
    </section>
  </main>
  <script src="/setup.js"></script>
</body>
</html>
